on:
  push:
    branches:
      - 'main'

jobs:
  mirror_latest_wrynose:
    runs-on: ubuntu-latest
    name: Mirror 'main' branch for latest 'wrynose' release branch
    steps:
    - name: Mirror action step
      id: mirror
      uses: google/mirror-branch-action@v1.0
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        source: 'main'
        dest: 'wrynose-latest'
